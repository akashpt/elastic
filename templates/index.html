<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEXA – Elastic Strip Detection</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../static/css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo-area">
        <div class="logo-box"><span>TEXA</span></div>
        <div class="title-block">
          <h1>Elastic</h1>
          <p>Industrial Vision System</p>
        </div>
      </div>
      <div class="header-stats">
        <div class="stat-pill">
          <span class="dot"></span> JOB ID <strong id="hdr-jobid">—</strong>
        </div>
        <div class="stat-pill">
          <span class="dot" id="status-dot"></span> STATUS
          <strong id="hdr-status">STANDBY</strong>
        </div>
        <div class="stat-pill">
          <span class="dot red"></span> DEFECTS
          <strong id="hdr-defects">0</strong>
        </div>
        <div class="stat-pill">ACCURACY <strong>98.4%</strong></div>
        <div class="clock" id="clock">00:00:00</div>
      </div>
    </header>

    <div class="main">
      <div class="left-col">
        <div class="feed-card" id="feed-card">
          <div class="feed-header">
            <div class="feed-title">
              <i class="fas fa-video"></i> Live Camera Feed
            </div>
            <div class="feed-meta">
              <span>HD · 1080P</span><span>30 FPS</span>
            </div>
          </div>

          <div class="feed-viewport">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
            <div class="scanline"></div>
            <div class="live-badge">● REC</div>

            <video
              id="cam-video"
              autoplay
              muted
              playsinline
              style="
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: none;
              "
            ></video>
            <canvas id="snap-canvas" style="display: none"></canvas>

            <!-- NO ACTIVE FEED with Font Awesome CRT Icon -->
            <div class="no-feed-msg" id="no-feed-msg">
              <i class="fas fa-video-slash"></i>
              <p>NO ACTIVE FEED</p>
              <small>Press START to begin detection</small>
            </div>
          </div>
        </div>

        <!-- <div class="counter-row">
          <div class="counter-card inspected">
            <div class="counter-label">Inspected</div>
            <div class="counter-value" id="cnt-inspected">0</div>
          </div>
          <div class="counter-card good">
            <div class="counter-label">Good</div>
            <div class="counter-value" id="cnt-good">0</div>
          </div>
          <div class="counter-card defective">
            <div class="counter-label">Defective</div>
            <div class="counter-value" id="cnt-defective">0</div>
          </div>
        </div> -->
      </div>

      <div class="right-col">
        <div class="panel-card">
          <div class="ctrl-tabs">
            <button
              class="ctrl-tab active"
              id="tab-det"
              onclick="switchTab('detection')"
            >
              🎯 Detection
            </button>
            <button
              class="ctrl-tab"
              id="tab-trn"
              onclick="switchTab('training')"
            >
              🧠 Training
            </button>
          </div>

          <!-- DETECTION BODY -->
          <div class="panel-body" id="body-detection">
            <div class="ctrl-row">
              <button
                class="ctrl-btn btn-start"
                id="start-btn"
                onclick="startDetection()"
                disabled
              >
                <div class="btn-circle">
                  <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
                </div>
                <span class="btn-label">START</span>
              </button>
              <button
                class="ctrl-btn btn-stop"
                id="stop-btn"
                onclick="stopDetection()"
                disabled
              >
                <div class="btn-circle">
                  <svg viewBox="0 0 24 24">
                    <rect x="6" y="6" width="12" height="12" rx="1" />
                  </svg>
                </div>
                <span class="btn-label">STOP</span>
              </button>
            </div>

            <div class="field-group">
              <div class="field-label">Job ID</div>
              <div class="combined-input">
                <input
                  type="text"
                  id="jobid-input"
                  placeholder="Enter or select Job ID"
                  oninput="syncJobId()"
                />
                <select id="jobid-select" onchange="syncJobId()">
                  <option value="">Select</option>
                  <option value="JOB-001">JOB-001</option>
                  <option value="JOB-002">JOB-002</option>
                  <option value="JOB-003">JOB-003</option>
                  <option value="JOB-004">JOB-004</option>
                  <option value="JOB-005">JOB-005</option>
                  <option value="JOB-006">JOB-006</option>
                </select>
              </div>
            </div>

            <div class="field-group">
              <div class="field-label">Detection Threshold</div>
              <div class="combined-input">
                <input
                  type="number"
                  id="thresh-input"
                  placeholder="0.00 - 1.00"
                  min="0"
                  max="1"
                  step="0.01"
                  oninput="syncThresh()"
                />
                <select id="thresh-select" onchange="syncThresh()">
                  <option value="">Select</option>
                  <option value="0.50">0.50 — Low</option>
                  <option value="0.65">0.65 — Medium-Low</option>
                  <option value="0.75">0.75 — Medium</option>
                  <option value="0.85">0.85 — High</option>
                  <option value="0.95">0.95 — Very High</option>
                </select>
              </div>
            </div>

            <button class="save-btn" onclick="saveConfig()">
              <i class="fas fa-save"></i> Save Configuration
            </button>
          </div>

          <!-- TRAINING BODY -->
          <div class="panel-body" id="body-training" style="display: none">
            <div class="ctrl-row">
              <button
                class="ctrl-btn btn-start"
                id="train-start-btn"
                onclick="startTraining()"
              >
                <div class="btn-circle">
                  <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
                </div>
                <span class="btn-label">START</span>
              </button>
              <button
                class="ctrl-btn btn-stop"
                id="train-stop-btn"
                onclick="stopTraining()"
                disabled
              >
                <div class="btn-circle">
                  <svg viewBox="0 0 24 24">
                    <rect x="6" y="6" width="12" height="12" rx="1" />
                  </svg>
                </div>
                <span class="btn-label">STOP</span>
              </button>
            </div>
            <!-- <div class="train-stats">
              <div class="train-stat">
                <div class="train-stat-val" id="train-epochs">0</div>
                <div class="train-stat-lbl">Epochs</div>
              </div>
              <div class="train-stat">
                <div class="train-stat-val" id="train-acc">—</div>
                <div class="train-stat-lbl">Accuracy</div>
              </div>
              <div class="train-stat">
                <div class="train-stat-val" id="train-loss">—</div>
                <div class="train-stat-lbl">Loss</div>
              </div>
            </div> -->
            <div id="train-log"></div>
          </div>
        </div>

        <div class="panel-card">
          <div
            class="panel-header"
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
            "
          >
            <span>Defected Images</span>
            <span
              id="defect-count-badge"
              style="
                font-family: &quot;Share Tech Mono&quot;, monospace;
                font-size: 10px;
                color: var(--red-accent);
              "
              >0 captured</span
            >
          </div>
          <div class="defect-scroll-wrap" id="defect-scroll-wrap">
            <div class="defect-empty" id="defect-empty">
              <i class="fas fa-image"></i>
              <span>No defects captured yet</span>
            </div>
            <div class="defect-grid" id="defect-grid"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Clock
      (function tick() {
        const n = new Date();
        document.getElementById("clock").textContent =
          String(n.getHours()).padStart(2, "0") +
          ":" +
          String(n.getMinutes()).padStart(2, "0") +
          ":" +
          String(n.getSeconds()).padStart(2, "0");
        setTimeout(tick, 1000);
      })();

      let activeTab = "detection";
      let configSaved = false; // Important: controls START button

      function switchTab(tab) {
        if (detRunning || trainRunning) return;
        activeTab = tab;
        document
          .getElementById("tab-det")
          .classList.toggle("active", tab === "detection");
        document
          .getElementById("tab-trn")
          .classList.toggle("active", tab === "training");
        document.getElementById("body-detection").style.display =
          tab === "detection" ? "flex" : "none";
        document.getElementById("body-training").style.display =
          tab === "training" ? "flex" : "none";
      }
      function lockOtherTab(lock) {
        const other = activeTab === "detection" ? "tab-trn" : "tab-det";
        document.getElementById(other).classList.toggle("tab-hidden", lock);
      }

      function syncDetectionButtons() {
        document.getElementById("start-btn").disabled =
          detRunning || !configSaved;
        document.getElementById("stop-btn").disabled = !detRunning;
      }

      function syncTrainingButtons() {
        document.getElementById("train-start-btn").disabled = trainRunning;
        document.getElementById("train-stop-btn").disabled = !trainRunning;
      }

      // Enable START button only after Save
      function enableStartButton() {
        configSaved = true;
        syncDetectionButtons();
      }

      function syncJobId() {
        const input = document.getElementById("jobid-input");
        const select = document.getElementById("jobid-select");
        if (document.activeElement !== input && select.value) {
          input.value = select.value;
        } else {
          const matchedOption = Array.from(select.options).find(
            (option) => option.value === input.value.trim(),
          );
          select.value = matchedOption ? matchedOption.value : "";
        }
        syncCustomDropdownState(select);
        document.getElementById("hdr-jobid").textContent = input.value || "—";
      }
      function syncThresh() {
        const input = document.getElementById("thresh-input");
        const select = document.getElementById("thresh-select");
        if (document.activeElement !== input && select.value) {
          input.value = select.value;
        } else {
          const matchedOption = Array.from(select.options).find(
            (option) => option.value === input.value.trim(),
          );
          select.value = matchedOption ? matchedOption.value : "";
        }
        syncCustomDropdownState(select);
      }

      function getOptionMeta(option) {
        const label = option.textContent.trim();
        const parts = label.split("—").map((part) => part.trim());

        if (parts.length > 1) {
          return {
            title: parts[0],
            subtitle: parts.slice(1).join(" — "),
          };
        }

        return {
          title: label,
          subtitle: "Click to use this option",
        };
      }

      function closeCustomDropdowns(exceptSelectId = "") {
        document.querySelectorAll(".combined-input.open").forEach((wrap) => {
          const select = wrap.querySelector("select");
          if (select && select.id !== exceptSelectId) {
            wrap.classList.remove("open");
            const panelCard = wrap.closest(".panel-card");
            if (panelCard) panelCard.classList.remove("dropdown-active");
          }
        });
      }

      function syncCustomDropdownState(select) {
        if (!select) return;
        const wrap = select.closest(".combined-input");
        if (!wrap) return;

        const triggerText = wrap.querySelector(".combo-trigger-text");
        const options = wrap.querySelectorAll(".combo-option");
        const selectedOption =
          select.options[select.selectedIndex] || select.options[0];

        if (triggerText) {
          triggerText.textContent =
            selectedOption && selectedOption.value
              ? selectedOption.value
              : "Choose";
        }

        options.forEach((optionBtn) => {
          optionBtn.classList.toggle(
            "is-active",
            optionBtn.dataset.value === select.value,
          );
        });
      }

      function initCustomDropdown(selectId, inputId, syncFn) {
        const select = document.getElementById(selectId);
        const input = document.getElementById(inputId);
        if (!select || !input) return;

        const wrap = select.closest(".combined-input");
        if (!wrap || wrap.querySelector(".combo-trigger")) return;

        const trigger = document.createElement("button");
        trigger.type = "button";
        trigger.className = "combo-trigger";
        trigger.innerHTML =
          '<span class="combo-trigger-text">Choose</span><span class="combo-trigger-icon"></span>';

        const menu = document.createElement("div");
        menu.className = "combo-menu";

        Array.from(select.options)
          .filter((option) => option.value)
          .forEach((option) => {
            const meta = getOptionMeta(option);
            const optionBtn = document.createElement("button");
            optionBtn.type = "button";
            optionBtn.className = "combo-option";
            optionBtn.dataset.value = option.value;
            optionBtn.innerHTML =
              `<span class="combo-option-title">${meta.title}</span>` +
              `<span class="combo-option-subtitle">${meta.subtitle}</span>`;

            optionBtn.addEventListener("click", () => {
              select.value = option.value;
              input.value = option.value;
              wrap.classList.remove("open");
              syncFn();
            });

            menu.appendChild(optionBtn);
          });

        trigger.addEventListener("click", () => {
          const isOpen = wrap.classList.contains("open");
          closeCustomDropdowns(selectId);
          wrap.classList.toggle("open", !isOpen);
          const panelCard = wrap.closest(".panel-card");
          if (panelCard) {
            panelCard.classList.toggle("dropdown-active", !isOpen);
          }
        });

        wrap.appendChild(trigger);
        wrap.appendChild(menu);
        syncCustomDropdownState(select);
      }

      const API_CONFIG = {
        enabled: false,
        endpoints: {
          saveConfig: "/api/config/save",
          startDetection: "/api/detection/start",
          stopDetection: "/api/detection/stop",
          startTraining: "/api/training/start",
          stopTraining: "/api/training/stop",
          dashboard: "/api/dashboard",
        },
      };

      function setText(id, value) {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
      }

      async function apiRequest(endpoint, options = {}) {
        if (!API_CONFIG.enabled || !endpoint) {
          return { skipped: true, data: null };
        }

        const requestOptions = {
          method: options.method || "GET",
          headers: {
            Accept: "application/json",
          },
        };

        if (options.body !== undefined) {
          requestOptions.headers["Content-Type"] = "application/json";
          requestOptions.body = JSON.stringify(options.body);
        }

        const response = await fetch(endpoint, requestOptions);
        const raw = await response.text();
        let data = null;

        try {
          data = raw ? JSON.parse(raw) : null;
        } catch (error) {
          data = raw;
        }

        if (!response.ok) {
          const message =
            data && typeof data === "object" && data.message
              ? data.message
              : `Request failed with status ${response.status}`;
          throw new Error(message);
        }

        return { skipped: false, data };
      }

      async function fetchDashboardData() {
        try {
          const result = await apiRequest(API_CONFIG.endpoints.dashboard);
          if (result.skipped || !result.data) return;

          const data = result.data;
          if (typeof data.jobId === "string") setText("hdr-jobid", data.jobId);
          if (typeof data.status === "string")
            setText("hdr-status", data.status.toUpperCase());
          if (typeof data.defects !== "undefined")
            setText("hdr-defects", String(data.defects));
        } catch (error) {
          showToast(
            error.message || "Unable to fetch dashboard data.",
            "error",
          );
        }
      }

      // Webcam
      const video = document.getElementById("cam-video");
      let camStream = null;

      async function startCamera() {
        try {
          camStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false,
          });
          video.srcObject = camStream;
          await video.play();
          video.style.display = "block";
          document.getElementById("no-feed-msg").style.display = "none";
        } catch (e) {
          showToast("Camera access denied or unavailable.");
        }
      }
      function stopCamera() {
        if (camStream) {
          camStream.getTracks().forEach((t) => t.stop());
          camStream = null;
        }
        video.srcObject = null;
        video.style.display = "none";
        document.getElementById("no-feed-msg").style.display = "flex";
      }
      function captureFrame() {
        const canvas = document.getElementById("snap-canvas");
        const ctx = canvas.getContext("2d");
        if (!video.videoWidth) return null;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        return canvas.toDataURL("image/jpeg", 0.75);
      }

      // Defects
      let defectCount = 0;
      function addDefectThumb(dataUrl) {
        defectCount++;
        document.getElementById("defect-empty").style.display = "none";
        document.getElementById("defect-count-badge").textContent =
          defectCount + " captured";
        const thumb = document.createElement("div");
        thumb.className = "defect-thumb";
        if (dataUrl) {
          const img = document.createElement("img");
          img.src = dataUrl;
          thumb.appendChild(img);
        }
        const lbl = document.createElement("div");
        lbl.className = "defect-label";
        lbl.textContent = "DEFECT #" + defectCount;
        const tsEl = document.createElement("div");
        tsEl.className = "defect-ts";
        tsEl.textContent = new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
        thumb.append(lbl, tsEl);
        document.getElementById("defect-grid").appendChild(thumb);
        document.getElementById("defect-scroll-wrap").scrollTop =
          document.getElementById("defect-scroll-wrap").scrollHeight;
      }

      function showToast(msg, type = "info") {
        let t = document.getElementById("toast");
        if (!t) {
          t = document.createElement("div");
          t.id = "toast";
          t.style.cssText =
            "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;";
          document.body.appendChild(t);
        }
        const colors = {
          info: "#222",
          success: "#1e8449",
          error: "#c0392b",
          warning: "#f39c12",
        };
        t.style.background = colors[type] || colors.info;
        t.textContent = msg;
        t.style.opacity = "1";
        setTimeout(() => (t.style.opacity = "0"), 2800);
      }

      /* Detection */
      let detRunning = false,
        detInterval = null;
      async function startDetection() {
        if (detRunning || !configSaved) return;
        const jid = document.getElementById("jobid-input").value.trim();
        const thr = document.getElementById("thresh-input").value.trim();
        if (!jid) {
          showToast("Please enter or select a Job ID first.", "warning");
          return;
        }

        try {
          await apiRequest(API_CONFIG.endpoints.startDetection, {
            method: "POST",
            body: {
              jobId: jid,
              threshold: thr,
            },
          });

          detRunning = true;
          syncDetectionButtons();
          lockOtherTab(true);
          document.getElementById("hdr-status").textContent = "RUNNING";
          document.getElementById("status-dot").style.cssText =
            "background:#f39c12;box-shadow:0 0 6px #f39c12;";
          document.getElementById("feed-card").classList.add("feed-running");

          setText("cnt-inspected", "0");
          setText("cnt-good", "0");
          setText("cnt-defective", "0");
          setText("hdr-defects", "0");

          await startCamera();
          showToast(`Detection started for ${jid}.`, "success");

          let i = 0,
            g = 0,
            d = 0;
          detInterval = setInterval(() => {
            i++;
            const isDef = Math.random() < 0.22;
            if (isDef) {
              d++;
              setText("hdr-defects", String(d));
              setText("cnt-defective", String(d));
              addDefectThumb(captureFrame());
            } else g++;
            setText("cnt-inspected", String(i));
            setText("cnt-good", String(g));
          }, 1400);
        } catch (error) {
          showToast(error.message || "Unable to start detection.", "error");
        }
      }

      async function stopDetection() {
        if (!detRunning) return;
        try {
          await apiRequest(API_CONFIG.endpoints.stopDetection, {
            method: "POST",
          });

          detRunning = false;
          syncDetectionButtons();
          clearInterval(detInterval);
          stopCamera();
          lockOtherTab(false);
          document.getElementById("hdr-status").textContent = "STANDBY";
          document.getElementById("status-dot").style.cssText = "";
          document.getElementById("feed-card").classList.remove("feed-running");
          showToast("Detection stopped.", "info");
        } catch (error) {
          showToast(error.message || "Unable to stop detection.", "error");
        }
      }

      /* Training - Camera also starts */
      let trainRunning = false,
        trainInterval = null,
        epoch = 0;
      async function startTraining() {
        if (trainRunning) return;
        try {
          await apiRequest(API_CONFIG.endpoints.startTraining, {
            method: "POST",
          });

          trainRunning = true;
          syncTrainingButtons();
          epoch = 0;
          lockOtherTab(true);
          document.getElementById("hdr-status").textContent = "TRAINING";
          document.getElementById("status-dot").style.cssText =
            "background:#8e44ad;box-shadow:0 0 6px #8e44ad;";
          document.getElementById("train-log").textContent =
            "Training in progress...";

          await startCamera();
          showToast("Training started.", "success");

          trainInterval = setInterval(() => {
            epoch++;
            const acc = (0.7 + Math.min(epoch * 0.015, 0.28)).toFixed(3);
            const loss = Math.max(0.07, 0.85 - epoch * 0.025).toFixed(4);
            setText("train-epochs", String(epoch));
            setText("train-acc", acc);
            setText("train-loss", loss);
            document.getElementById("train-log").textContent =
              `Epoch ${epoch} - acc: ${acc} | loss: ${loss}`;
          }, 900);
        } catch (error) {
          showToast(error.message || "Unable to start training.", "error");
        }
      }

      async function stopTraining() {
        if (!trainRunning) return;
        try {
          await apiRequest(API_CONFIG.endpoints.stopTraining, {
            method: "POST",
          });

          trainRunning = false;
          syncTrainingButtons();
          clearInterval(trainInterval);
          stopCamera();
          lockOtherTab(false);
          document.getElementById("hdr-status").textContent = "STANDBY";
          document.getElementById("status-dot").style.cssText = "";
          document.getElementById("train-log").textContent =
            epoch > 0 ? `Stopped at epoch ${epoch}.` : "";
          showToast("Training stopped.", "info");
        } catch (error) {
          showToast(error.message || "Unable to stop training.", "error");
        }
      }

      /* Save Configuration - Enables START button */
      async function saveConfig() {
        const jid = document.getElementById("jobid-input").value.trim();
        const thr = document.getElementById("thresh-input").value.trim();
        if (!jid || !thr) {
          showToast(
            "Please fill Job ID and Threshold before saving.",
            "warning",
          );
          return;
        }
        try {
          await apiRequest(API_CONFIG.endpoints.saveConfig, {
            method: "POST",
            body: {
              jobId: jid,
              threshold: thr,
            },
          });

          const btn = document.querySelector(".save-btn");
          const orig = btn.innerHTML;
          btn.innerHTML = '<i class="fas fa-check"></i> Saved!';
          btn.style.background = "linear-gradient(135deg,#1e8449,#27ae60)";

          enableStartButton();
          showToast("Configuration saved successfully.", "success");

          setTimeout(() => {
            btn.innerHTML = orig;
            btn.style.background = "";
          }, 1800);
        } catch (error) {
          showToast(error.message || "Unable to save configuration.", "error");
        }
      }

      syncDetectionButtons();
      syncTrainingButtons();
      initCustomDropdown("jobid-select", "jobid-input", syncJobId);
      initCustomDropdown("thresh-select", "thresh-input", syncThresh);
      document.addEventListener("click", (event) => {
        if (!event.target.closest(".combined-input")) {
          closeCustomDropdowns();
        }
      });
